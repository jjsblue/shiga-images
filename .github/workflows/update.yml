name: 每週自動更新機票價格

on:
  schedule:
    - cron: '0 0 * * 0'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # Install
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # Run script
      - name: Run flight scraper
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python update_flights.py

            # 5. Commit & Push
     - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 強制儲存任何未提交的變動，避免 rebase 失敗
          git stash
          
          # 拉取遠端最新版本並重定基底
          git pull --rebase origin main || echo "No rebase needed"
          
          # 將暫存的變動釋放回來
          git stash pop || echo "No stash to pop"
          
          # 加入變更
          git add data.json || echo "No data.json to add"
          
          # 如果沒有產生新檔案或沒有變動，直接結束不報錯
          git diff --staged --quiet && exit 0
          
          # commit & push
          git commit -m "🤖 Auto-update flight prices"
          git push origin HEAD:main
